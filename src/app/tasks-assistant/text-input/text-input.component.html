<mat-form-field class="input-text">
  <mat-label i18n="@@textInputTextLabel">Text</mat-label>
  <textarea matInput
            #textInput
            placeholder="Beginnen Sie hier mit der Eingabe ..."
            i18n-placeholder="@@textInputPlaceholder"
            rows="5"
            [formControl]="textControl"></textarea>
  <mat-error *ngIf="textControl?.invalid">
    <span i18n="@@textInputRequired">Bitte geben Sie einen Text ein, bevor Sie eine Aufgabe generieren.</span>
  </mat-error>
</mat-form-field>
