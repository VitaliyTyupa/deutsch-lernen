<mat-card>
  <mat-card-title><h3 i18n="@@authRegisterTitle">Registrierung</h3></mat-card-title>

    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
      <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label i18n="@@authNameLabel">Name</mat-label>
        <input matInput formControlName="name" type="text">
        <mat-error *ngIf="registrationForm.get('name')?.invalid">
          <span i18n="@@authNameMinLength">Name muss mindestens 3 Zeichen enthalten</span>
        </mat-error>
      </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label i18n="@@authEmailLabel">Email</mat-label>
          <input matInput formControlName="email" type="email">
          <mat-error *ngIf="registrationForm.get('email')?.invalid">
            <span i18n="@@authEmailInvalidShort">Geben Sie eine gültige E-Mail-Adresse ein</span>
          </mat-error>
        </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label i18n="@@authPasswordLabel">Kennwort</mat-label>
        <input matInput
               [type]="!showPassword() ? 'password' : 'text'"
               formControlName="password" >
        <button
          mat-icon-button
          matSuffix
          (click)="changeStatus($event)">
          <mat-icon>{{showPassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="registrationForm.get('password')?.invalid">
          <span i18n="@@authPasswordMinLength">Kennwort muss mindestens 6 Zeichen enthalten</span>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label i18n="@@authConfirmPasswordLabel">Bestätigung des Kennworts</mat-label>
        <input matInput
               formControlName="confirmPassword"
               [type]="!showPassword() ? 'password' : 'text'">
        <button
          mat-icon-button
          matSuffix
          (click)="changeStatus($event)">
          <mat-icon>{{showPassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="registrationForm.get('confirmPassword')?.hasError('PasswordNoMatch')">
          <span i18n="@@authPasswordNoMatch">Wiederholen Sie das Passwort noch einmal.</span>
        </mat-error>
      </mat-form-field>
      <div class="roles-container">
        <div i18n="@@authRoleLabel">Deine Rolle: </div>
        <mat-button-toggle-group formControlName="role">
          <mat-button-toggle value="teacher">
            <span i18n="@@authTeacherRole">Lehrerin</span> <mat-icon>local_library</mat-icon>
          </mat-button-toggle>
          <mat-button-toggle value="student">
            <span i18n="@@authStudentRole">Schulerin</span> <mat-icon>school</mat-icon>
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>
      <mat-card-actions>
      <button mat-flat-button color="primary" type="submit" [disabled]="registrationForm.invalid">
        <span i18n="@@authRegisterSubmit">Registrieren</span>
      </button>
      </mat-card-actions>
  </mat-card-content>
    </form>


</mat-card>
