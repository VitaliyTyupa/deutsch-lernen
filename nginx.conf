server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    set $locale de;
    if ($http_accept_language ~* "^ua") {
      set $locale ua;
    }
    if ($http_accept_language ~* "^en") {
      set $locale en;
    }
    if ($http_accept_language ~* "^de") {
      set $locale de;
    }
    return 302 /$locale/;
  }

  location = /de {
    return 302 /de/;
  }

  location = /ua {
    return 302 /ua/;
  }

  location = /en {
    return 302 /en/;
  }

  location /de/ {
    try_files $uri $uri/ /de/index.html;
  }

  location /ua/ {
    try_files $uri $uri/ /ua/index.html;
  }

  location /en/ {
    try_files $uri $uri/ /en/index.html;
  }
}
