server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    set $locale de;
    if ($http_accept_language ~* "^uk") {
      set $locale uk;
    }
    if ($http_accept_language ~* "^en") {
      set $locale en;
    }
    if ($http_accept_language ~* "^de") {
      set $locale de;
    }
    return 302 /$locale/;
  }

  location = /de {
    return 302 /de/;
  }

  location = /uk {
    return 302 /uk/;
  }

  location = /en {
    return 302 /en/;
  }

  location /de/ {
    try_files $uri $uri/ /de/index.html;
  }

  location /uk/ {
    try_files $uri $uri/ /uk/index.html;
  }

  location /en/ {
    try_files $uri $uri/ /en/index.html;
  }
}
